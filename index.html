<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Feliz Aniversario 💛</title>

<style>
body {
    margin: 0;
    min-height: 100vh;
    font-family: Arial, sans-serif;
    text-align: center;
    color: white;
    background: linear-gradient(to top, #1a1a2e, #16213e, #0f3460);
    overflow-x: hidden;
}

.container {
    position: relative;
    z-index: 2;
    padding-top: 80px;
    padding-bottom: 40px;
}

h1 {
    font-size: 2.2em;
    animation: glow 2s infinite alternate;
    margin-bottom: 20px;
}

@keyframes glow {
    from { text-shadow: 0 0 10px #ffd700; }
    to { text-shadow: 0 0 25px #fff, 0 0 40px #ffd700; }
}

.card {
    background: rgba(255,255,255,0.1);
    margin: 0 auto 40px auto;
    padding: 25px;
    border-radius: 20px;
    width: 90%;
    max-width: 500px;
    backdrop-filter: blur(10px);
}

img {
    width: 100%;
    border-radius: 15px;
    margin-top: 10px;
}

/* Corazones */
.heart {
    position: absolute;
    font-size: 25px;
    animation: fallHeart linear infinite;
}

@keyframes fallHeart {
    0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 1;
}
</style>
</head>

<body>

<canvas id="fireworks"></canvas>

<div class="container">
    <h1>✨💛 Feliz aniversario Boquita Bb!! 💛✨</h1>

    <div class="card">
        <p>Desde el <strong>28 de marzo de 2020</strong> 💛</p>
        <p>Llevamos juntas:</p>
        <p id="time"></p>

        <img src="https://github.com/Eli0529/FELIZ_ANIVERSARIO-/blob/main/foto.jpg">

        <p>
        Gracias por cada momento, cada risa y cada recuerdo juntas 💛<br><br>
        Si existe un lugar como <strong>San Junipero</strong>…<br>
        quiero vivirlo contigo una y otra vez ✨
        </p>
    </div>
</div>

<audio id="music" loop>
  <source src="cancion.mp3" type="audio/mpeg">
</audio>

<script>
// Música al tocar
document.addEventListener("click", () => {
  document.getElementById("music").play();
});

// Contador de tiempo
function updateTime() {
    const startDate = new Date("2020-03-28");
    const now = new Date();

    let years = now.getFullYear() - startDate.getFullYear();
    let months = now.getMonth() - startDate.getMonth();
    let days = now.getDate() - startDate.getDate();

    if (days < 0) {
        months--;
        const lastMonth = new Date(now.getFullYear(), now.getMonth(), 0);
        days += lastMonth.getDate();
    }

    if (months < 0) {
        years--;
        months += 12;
    }

    document.getElementById("time").innerText =
    `${years} años, ${months} meses y ${days} días 💕`;
}
updateTime();

// Corazones cayendo
function createHeart() {
    const heart = document.createElement("div");
    heart.innerHTML = "💖";
    heart.classList.add("heart");

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (20 + Math.random() * 20) + "px";
    heart.style.animationDuration = (4 + Math.random() * 4) + "s";

    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 9000);
}
setInterval(createHeart, 300);

// Fuegos artificiales
const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
let particles = [];

function createFirework() {
    let x = Math.random() * canvas.width;
    let y = Math.random() * canvas.height / 2;
    for (let i = 0; i < 50; i++) {
        particles.push({
            x: x,
            y: y,
            vx: (Math.random() - 0.5) * 5,
            vy: (Math.random() - 0.5) * 5,
            alpha: 1
        });
    }
}

function updateFireworks() {
    ctx.fillStyle = "rgba(0,0,0,0.2)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    particles.forEach((p, i) => {
        p.x += p.vx;
        p.y += p.vy;
        p.alpha -= 0.01;
        ctx.fillStyle = "rgba(255,215,0," + p.alpha + ")";
        ctx.beginPath();
        ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
        ctx.fill();
        if (p.alpha <= 0) particles.splice(i, 1);
    });

    requestAnimationFrame(updateFireworks);
}

setInterval(createFirework, 800);
updateFireworks();
</script>

</body>
</html>
